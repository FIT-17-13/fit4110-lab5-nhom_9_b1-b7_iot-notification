version: "3.8"

services:
  # ==========================================
  # PHẦN B1: IOT INGESTION (Tiếp nhận dữ liệu)
  # ==========================================
  
  # 1. PostgreSQL Database cho IoT
  postgres-db:
    image: postgres:15-alpine
    container_name: fit4110-iot-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-iotdb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. IoT API Service
  iot-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-iot-api-lab05
    env_file:
      - .env
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${IOT_API_PORT:-8000}:8000"
    command: ["sh", "-c", "uvicorn src.iot_api.main:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==========================================
  # PHẦN B7: NOTIFICATION (Gửi cảnh báo)
  # ==========================================

  # 3. Message Queue (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management
    platform: linux/amd64
    container_name: fit4110-rabbitmq-lab05
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-notify_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secretpass}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - team-internal
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Notification API Service
  notification-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-notify-api-lab05
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${NOTIFY_API_PORT:-8001}:8000"
    command: ["sh", "-c", "uvicorn src.notification_api.main:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 5. Notification Worker Service
  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-notify-worker-lab05
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - team-internal
    command: ["python", "-m", "src.worker.main"]
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep src.worker.main || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==========================================
  # PHẦN LAB 6: IOT INGESTION SERVICE
  # ==========================================
  iot-ingestion:
    build: ./lab6_iot_ingestion
    container_name: fit4110-iot-ingestion-lab06
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./lab6_iot_ingestion:/app
    networks:
      - team-internal

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data:
  rabbitmq-data: